# =============================================================================
# Model Downloader 配置文件
# 用于夜间自动下载 AI 模型权重
# =============================================================================

# ---------------------------------------------------------------------------
# 下载方式（根据 2026-06-06 测试结果）
#   - hf-cli:    hf download 命令（❌ Windows 下有 SSL 错误）
#   - python-sdk: huggingface_hub.snapshot_download（✅ 测试通过）
# ---------------------------------------------------------------------------
download_method: "python-sdk"

# ---------------------------------------------------------------------------
# 代理配置（Clash Verge: 127.0.0.1:7897）
# 注意：hf-mirror 镜像直连通常不需要代理
#       仅在回退到 HuggingFace 直连时才需要开代理
# ---------------------------------------------------------------------------
proxy:
  http:  "http://127.0.0.1:7897"
  https: "http://127.0.0.1:7897"
  # 仅在回退到 HuggingFace 直连时启用
  enabled: false

# ---------------------------------------------------------------------------
# 镜像站（按优先级排列）
# ---------------------------------------------------------------------------
mirrors:
  - name: "hf-mirror"
    endpoint: "https://hf-mirror.com"
    needs_proxy: false
  - name: "huggingface-official"
    endpoint: "https://huggingface.co"
    needs_proxy: true

# ---------------------------------------------------------------------------
# 存储路径
# ---------------------------------------------------------------------------
paths:
  download_dir: "D:/cc_download"
  log_dir: "D:/AAA_study/my_code_file/my_cc/model_downloader/logs"

# ---------------------------------------------------------------------------
# 时间窗口控制
# ---------------------------------------------------------------------------
schedule:
  start_hour: 23
  start_minute: 30
  stop_new_hour: 5
  stop_new_minute: 50
  hard_stop_hour: 6
  hard_stop_minute: 0

# ---------------------------------------------------------------------------
# 重试策略
# ---------------------------------------------------------------------------
retry:
  max_retries: 3
  retry_delay: 30

# ---------------------------------------------------------------------------
# HuggingFace 认证（暂不需要）
# ---------------------------------------------------------------------------
hf_token: ""
